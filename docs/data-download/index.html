<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Descarga de datos</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #020807;
      color: #22c55e;
      font-family: "Courier New", monospace;
      overflow: hidden;
      display: grid;
      place-items: center;
    }
    #matrix {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: rgba(34, 197, 94, 0.22);
      white-space: pre;
      font-size: 0.95rem;
      line-height: 1.08;
      user-select: none;
      filter: blur(0.2px);
    }
    .panel {
      position: relative;
      width: min(92vw, 720px);
      border: 1px solid rgba(34, 197, 94, 0.5);
      background: rgba(2, 16, 12, 0.86);
      padding: 1.4rem;
      box-shadow: 0 0 35px rgba(16, 185, 129, 0.25);
      z-index: 1;
    }
    .header { margin: 0 0 0.9rem; color: #86efac; }
    .line { min-height: 1.4rem; }
    .warn {
      margin-top: 1rem;
      color: #facc15;
      font-family: Arial, sans-serif;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <pre id="matrix" aria-hidden="true"></pre>
  <section class="panel" role="status" aria-live="polite">
    <h1 class="header">:: INICIALIZANDO ACCESO ::</h1>
    <div class="line" id="typed"></div>
    <p class="warn">
      ⚠️ Esto es una simulación educativa. Un enlace malicioso podría robar información real.
      Verifica siempre la URL antes de abrir cualquier QR.
    </p>
  </section>

  <script>
    (function () {
      var messages = [
        'Accediendo a cuentas bancarias...',
        'Descargando imágenes personales...',
        'Extrayendo contactos y conversaciones...',
        'Copiando credenciales guardadas...',
        'Enviando datos a servidor externo...'
      ];
      var line = document.getElementById('typed');
      var msg = 0, ch = 0, deleting = false;

      function typeLoop() {
        var text = messages[msg];
        if (!deleting) {
          ch++;
          line.textContent = '> ' + text.slice(0, ch);
          if (ch === text.length) { deleting = true; setTimeout(typeLoop, 900); return; }
        } else {
          ch--;
          line.textContent = '> ' + text.slice(0, ch);
          if (ch === 0) { deleting = false; msg = (msg + 1) % messages.length; }
        }
        setTimeout(typeLoop, deleting ? 35 : 55);
      }
      typeLoop();

      var matrix = document.getElementById('matrix');
      var chars = '01#$%&/\\{}[]<>?ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      function generateBackdrop() {
        var rows = Math.ceil(window.innerHeight / 16);
        var cols = Math.ceil(window.innerWidth / 10);
        var out = [];
        for (var r = 0; r < rows; r++) {
          var row = '';
          for (var c = 0; c < cols; c++) {
            row += chars[Math.floor(Math.random() * chars.length)];
          }
          out.push(row);
        }
        matrix.textContent = out.join('\n');
      }
      generateBackdrop();
      setInterval(generateBackdrop, 130);
      window.addEventListener('resize', generateBackdrop);
    })();
  </script>
</body>
</html>
